spring:
  config:
    activate:
      on-profile: prod

  # jpa 설정
  jpa:
    hibernate:
      # (매우 중요) 운영 환경에서는 절대로 JPA가 스키마를 건드리지 않도록 'none'으로 설정합니다.
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 데이터베이스 설정 (운영 환경)
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${PGUSER:${SPRING_DATASOURCE_USERNAME}}
    password: ${PGPASSWORD:${SPRING_DATASOURCE_PASSWORD}}

  # Flyway 활성화 (운영 환경 스키마 관리)
  flyway:
    enabled: true

# 운영 환경에서는 일반적으로 불필요한 SQL 로그를 남기지 않도록 설정합니다.
# common.yml의 설정을 덮어쓰고 싶다면 아래와 같이 명시적으로 레벨을 지정할 수 있습니다.
logging:
  level:
    "[org.hibernate.SQL]": info
    "[org.hibernate.type.descriptor.sql]": info

# Swagger 설정(운영 환경에서는 비활성화)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
