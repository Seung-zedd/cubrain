spring:
  config:
    activate:
      on-profile: prod

  # jpa 설정
  jpa:
    hibernate:
      # ✅ MVP 전략: Flyway 대신 JPA가 테이블을 생성/수정하도록 'update'로 변경!
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false # 운영 로그 깔끔하게

  # 데이터베이스 설정 (운영 환경)
  datasource:
    # Use individual connection parameters instead of DATABASE_URL
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}

  # Flyway 활성화 (운영 환경 스키마 관리)
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

# 운영 환경에서는 일반적으로 불필요한 SQL 로그를 남기지 않도록 설정합니다.
# common.yml의 설정을 덮어쓰고 싶다면 아래와 같이 명시적으로 레벨을 지정할 수 있습니다.
logging:
  level:
    "[org.hibernate.SQL]": info
    "[org.hibernate.type.descriptor.sql]": info

# Swagger 설정(운영 환경에서는 비활성화)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
