spring:
  config:
    activate:
      on-profile: prod

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # jpa 설정
  jpa:
    hibernate:
      # ✅ Production: Use 'none' to prevent Hibernate from altering the schema managed by Flyway
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": false # 운영 로그 깔끔하게

  # 데이터베이스 설정 (운영 환경)
  datasource:
    # Use individual connection parameters instead of DATABASE_URL
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/postgres
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}

  # Flyway 활성화 (운영 환경 스키마 관리)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 운영 환경에서는 일반적으로 불필요한 SQL 로그를 남기지 않도록 설정합니다.
# common.yml의 설정을 덮어쓰고 싶다면 아래와 같이 명시적으로 레벨을 지정할 수 있습니다.
logging:
  level:
    "[org.hibernate.SQL]": info
    "[org.hibernate.type.descriptor.sql]": info

# Swagger 설정(운영 환경에서는 비활성화)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ✅ AI 설정 (Prod)
langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: "${GEMINI_API_KEY}" # Railway 환경변수에서 가져옴
      model-name: gemini-2.0-flash
      temperature: 0.7
    embedding-model:
      api-key: "${GEMINI_API_KEY}"
      model-name: text-embedding-004
  document-splitter:
    chunk-size: 1000
    chunk-overlap: 200

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000 # 1 hour
  refresh-token-expiration: 1209600000 # 14 days
  cookie:
    secure: true
    samesite: None
