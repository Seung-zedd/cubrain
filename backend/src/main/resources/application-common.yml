spring:
  config:
    activate:
      on-profile: common

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # 애플리케이션 이름 설정 (공통)
  application:
    name: cubrainApp # 원하는 이름으로 변경 (예: MySpringBootApp)

  # 데이터베이스 드라이버 (공통)
  datasource:
    driver-class-name: org.postgresql.Driver

  # H2 콘솔 비활성화 (모든 환경에서 명시적으로 false 설정)
  h2:
    console:
      enabled: false

  # Flyway 설정 (기본값: disabled, prod에서 override)
  flyway:
    # enabled: false # Removed to prevent overriding prod settings
    baseline-on-migrate: true # Create baseline when first migration runs
    baseline-version: 1 # Starting version

  # for mail
  mail:
    host: smtp.gmail.com
    port: 465 # Changed from 587
    username: ${MAIL_USERNAME} # google email
    password: ${MAIL_PASSWORD} # google app password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
