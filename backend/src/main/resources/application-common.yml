spring:
  config:
    activate:
      on-profile: common

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # 애플리케이션 이름 설정 (공통)
  application:
    name: my-app-server # 원하는 이름으로 변경 (예: MySpringBootApp)

  # 데이터베이스 드라이버 (공통)
  datasource:
    driver-class-name: org.postgresql.Driver

  # H2 콘솔 비활성화 (모든 환경에서 명시적으로 false 설정)
  h2:
    console:
      enabled: false

  # JPA 설정 (공통: format_sql과 naming strategy)
  jpa:
    properties:
      hibernate:
        "[format_sql]": true
  # comment due to mismatched table names between naming strategy and flyway
  # hibernate:
  #   naming:
  #   physical-strategy: com.cubrain.springboot_starter_auth.global.logging.CamelCaseToSnakeAndUpperCaseStrategy

  # Flyway 설정 (기본값: disabled, dev/prod에서 override)
  flyway:
    # enabled: false # Removed to prevent overriding prod settings
    baseline-on-migrate: true # Create baseline when first migration runs
    baseline-version: 1 # Starting version
