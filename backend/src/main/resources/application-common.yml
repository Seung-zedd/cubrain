spring:
  config:
    activate:
      on-profile: common

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # 애플리케이션 이름 설정 (공통)
  application:
    name: cubrainApp # 원하는 이름으로 변경 (예: MySpringBootApp)

  # 데이터베이스 드라이버 (공통)
  datasource:
    driver-class-name: org.postgresql.Driver

  # H2 콘솔 비활성화 (모든 환경에서 명시적으로 false 설정)
  h2:
    console:
      enabled: false

  # Flyway 설정 (기본값: disabled, prod에서 override)
  flyway:
    # enabled: false # Removed to prevent overriding prod settings
    baseline-on-migrate: true # Create baseline when first migration runs
    baseline-version: 1 # Starting version

  # Security: Supabase OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          # Supabase uses HS256 by default for JS client tokens.
          # Provide the JWT Secret via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_SECRET_KEY
          # or the legacy JWT_SECRET environment variable.
          issuer-uri: https://nsnbzlzttvvxdlhsuskt.supabase.co/auth/v1
          jwk-set-uri: https://nsnbzlzttvvxdlhsuskt.supabase.co/auth/v1/get_jwks

# Lemon Squeezy Webhook Settings (Common Structure)
lemonsqueezy:
  webhook:
    # Key point: Put an 'environment variable holder' here, not a specific value.
    # This means that the value will be injected under the name 'LEMONSQUEEZY_WEBHOOK_SECRET' from the OS or distribution environment (Railway).
    secret: ${LEMONSQUEEZY_WEBHOOK_SECRET} 