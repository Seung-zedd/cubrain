spring:
  config:
    activate:
      on-profile: local

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # JPA 설정 (로컬: create로 초기화)
  # hibernate와 flyway schema가 일치하지 않기 때문에 local에서만 사용
  jpa:
    properties:
      hibernate:
        "[format_sql]": true
        ddl-auto: create # 매번 테이블 재생성 (테스트용)
      naming:
        physical-strategy: com.cubrain.springboot_starter_auth.global.logging.CamelCaseToSnakeAndUpperCaseStrategy

  # Flyway 비활성화 (로컬은 ddl-auto 사용)
  flyway:
    enabled: false

  # 소셜 로그인 로직 테스트용(로컬)
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true # static 매핑 활성화 (default true지만 명시)

  # 데이터베이스 설정
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# Swagger 설정 (local에서만 활성화 – Apidog 동기화용)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# ✅ AI 설정 (Local)
langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: "${GEMINI_API_KEY_LOCAL}" # .env 파일에서 가져옴
      model-name: gemini-2.0-flash-exp
      temperature: 0.7
    embedding-model:
      api-key: "${GEMINI_API_KEY_LOCAL}"
      model-name: text-embedding-004
  document-splitter:
    chunk-size: 1000
    chunk-overlap: 200
# JWT 설정
jwt:
  secret: ${JWT_SECRET:e5V1vprqaXAy/yPCemmDZgEY7ciIEMZDDsGjH7tRBmgJI7nKmpLAMMx7irdw/2nzcheuXHVIB7XYqqSsVKi0pw==}
  access-token-expiration: 3600000 # 1 hour
  refresh-token-expiration: 1209600000 # 14 days
  cookie:
    secure: false
    samesite: Lax

# Resend API (Local Override)
resend:
  api-key: ${RESEND_API_KEY_LOCAL:re_dummy_key_for_local}
