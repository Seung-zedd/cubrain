spring:
  profiles:
    default: local # for running in local env
    group:
      local: common, local
      prod: common, prod
  application:
    name: cubrainApp
  output:
    ansi:
      enabled: ALWAYS

# ✅ AI 설정 추가
langchain4j:
  google-ai-gemini: # 런타임에 이미 잘 돌아갔기 때문에, IDE가 멍청해서 못 읽은거임 걍 무시하셈
    chat-model:
      api-key: "${GEMINI_API_KEY}" # .env 파일에서 가져옴
      model-name: gemini-2.0-flash-exp # ⚡️ 가성비/속도 최강 모델
      temperature: 0.7
    embedding-model:
      api-key: "${GEMINI_API_KEY}"
      model-name: text-embedding-004
  document-splitter:
    # 1000 tokens (approx 4000 chars) - Optimized for AI context window
    chunk-size: 1000
    # 200 tokens overlap to maintain context continuity
    chunk-overlap: 200
