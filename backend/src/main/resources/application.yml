spring:
  profiles:
    default: local # for running in local env
    group:
      local: common, local
      prod: common, prod
      dev: common, dev
  application:
    name: cubrainApp

  # for logging colors
  output:
    ansi:
      enabled: ALWAYS

  # for mail
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME} 
    password: ${MAIL_PASSWORD} 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# for logging
logging:
  level:
    "[org.apache.pdfbox.pdmodel.interactive.annotation.PDAnnotation]": OFF
