services:
  db:
    image: pgvector/pgvector:pg16 # <--- The Magic Image (Standard DB + AI Plugin)
    container_name: cubrain-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
