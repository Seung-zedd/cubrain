name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 0 * * *" # 매일 자정 실행
  workflow_dispatch:

jobs:
  ping-supabase-db:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Query Supabase Database Directly
        run: |
          # 수파베이스 DB에 직접 접속하여 봇 필터링을 완벽하게 우회합니다.
          psql "${{ secrets.SUPABASE_DB_URL }}" -c "SELECT 1;"
